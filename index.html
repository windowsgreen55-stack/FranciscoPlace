<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FranciscoPlace</title>

<style>
body {
    margin: 0;
    background: black;
    font-family: Arial;
    color: white;
}

/* tela inicial */
#home {
    display: flex;
    height: 100vh;
}

.img-box {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
}

.img-box img {
    max-width: 80%;
    border: 3px solid white;
    transition: 0.3s;
}

.img-box img:hover {
    transform: scale(1.05);
}

/* chat */
#chatScreen {
    display: none;
    height: 100vh;
    background: #2e2673;
    position: relative;
}

.chatbox {
    position: absolute;
    left: 20px;
    top: 50px;
    width: 300px;
    height: 400px;
    background: #00ff00;
    display: flex;
    flex-direction: column;
}

.chatbox-header {
    background: #00cc00;
    padding: 5px;
    font-weight: bold;
    color: black;
}

.messages {
    flex: 1;
    overflow-y: auto;
    background: #f0f0f0;
    color: black;
    padding: 5px;
    font-size: 12px;
}

.input-area {
    display: flex;
}

.input-area input {
    flex: 1;
    border: none;
    padding: 5px;
}

.input-area button {
    background: black;
    color: white;
    border: none;
    padding: 5px;
    cursor: pointer;
}
</style>
</head>

<body>

<div id="home">
    <div class="img-box" onclick="clickHousel()">
        <img src="housel.jpg">
    </div>

    <div class="img-box" onclick="openChat()">
        <img src="francisco.jpg">
    </div>
</div>

<div id="chatScreen">
    <div class="chatbox">
        <div class="chatbox-header">chatbox</div>
        <div class="messages" id="messages"></div>

        <div class="input-area">
            <input id="msgInput" placeholder="Digite...">
            <button onclick="sendMsg()">OK</button>
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAGgsgpT1IdpfZrZkfne_sIVYhxCGugghE",
  authDomain: "yess-944cc.firebaseapp.com",
  projectId: "yess-944cc",
  storageBucket: "yess-944cc.firebasestorage.app",
  messagingSenderId: "1000768184368",
  appId: "1:1000768184368:web:e78e8042c525e2d30d8df5"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let username = "anon";

window.clickHousel = function() {
    alert("????");
}

window.openChat = function() {
    document.getElementById("home").style.display = "none";
    document.getElementById("chatScreen").style.display = "block";

    username = prompt("Digite seu nome:");
    if (!username) username = "anon";

    loadMessages();
}

window.sendMsg = async function() {
    const input = document.getElementById("msgInput");
    const text = input.value;

    if (!text) return;

    await addDoc(collection(db, "chat"), {
        user: username,
        msg: text,
        time: Date.now()
    });

    input.value = "";
}

function loadMessages() {
    const q = query(collection(db, "chat"), orderBy("time"));

    onSnapshot(q, (snapshot) => {
        const messagesDiv = document.getElementById("messages");
        messagesDiv.innerHTML = "";

        snapshot.forEach(doc => {
            const data = doc.data();
            const div = document.createElement("div");
            div.textContent = data.user + ": " + data.msg;
            messagesDiv.appendChild(div);
        });

        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    });
}
</script>

</body>
</html>
